services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-nvltrnslt}
    ports:
      - "${LOCAL_POSTGRES_PORT:-55473}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - nvltrnslt_postgres_data:/var/lib/postgresql/data

volumes:
  nvltrnslt_postgres_data:
